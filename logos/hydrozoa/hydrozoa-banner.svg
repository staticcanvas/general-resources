<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0a0f1a" />
  <defs>
    <linearGradient id="tentacleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Tentacle Background Elements -->
  <path d="M -200 100 Q 600 50 1400 400" fill="none" stroke="url(#tentacleGradient)" stroke-width="1" filter="url(#glow)" opacity="0.1" stroke-dasharray="20 40" />
  <path d="M -100 250 Q 700 150 1400 500" fill="none" stroke="url(#tentacleGradient)" stroke-width="1" filter="url(#glow)" opacity="0.1" stroke-dasharray="20 40" />
  <path d="M 0 400 Q 800 250 1400 600" fill="none" stroke="url(#tentacleGradient)" stroke-width="1" filter="url(#glow)" opacity="0.1" stroke-dasharray="20 40" />
  
  <!-- Logo Integration -->
  <g transform="translate(100, 100) scale(2)">
    <path 
      d="M 50 20 C 30 20 15 35 15 55 C 15 65 25 70 50 70 C 75 70 85 65 85 55 C 85 35 70 20 50 20 Z" 
      fill="url(#tentacleGradient)" 
      opacity="0.9"
    />
    <path d="M 30 70 Q 25 85 30 95" fill="none" stroke="url(#tentacleGradient)" stroke-width="3" stroke-linecap="round" />
    <path d="M 40 70 Q 35 90 40 95" fill="none" stroke="url(#tentacleGradient)" stroke-width="3" stroke-linecap="round" />
    <path d="M 50 70 Q 45 85 50 95" fill="none" stroke="url(#tentacleGradient)" stroke-width="3" stroke-linecap="round" />
    <path d="M 60 70 Q 55 90 60 95" fill="none" stroke="url(#tentacleGradient)" stroke-width="3" stroke-linecap="round" />
    <path d="M 70 70 Q 65 85 70 95" fill="none" stroke="url(#tentacleGradient)" stroke-width="3" stroke-linecap="round" />
    <circle cx="50" cy="45" r="8" fill="white" opacity="0.3" />
  </g>
  
  <!-- Text Content -->
  <text x="350" y="220" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="url(#tentacleGradient)" letter-spacing="-4">HYDROZOA</text>
  <text x="355" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#fff" opacity="0.6" letter-spacing="12">GIT MULTIPOINT MIRROR AGENT</text>
</svg>
