<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
<!-- Background -->
<rect width="1200" height="800" fill="#0a0e1a"/>
  
<!-- Title -->
<text x="600" y="40" font-family="Arial, sans-serif" font-size="24" fill="#64748b" text-anchor="middle" font-weight="600">terminalmd - Professional TUI Markdown Engine</text>
<text x="600" y="65" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Native AOT • Single Binary • Zero Dependencies • Full Markdown Fidelity</text>
  
<!-- PRIMARY LOGO -->
<g id="primary-logo">
<text x="100" y="115" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" font-weight="600">PRIMARY LOGO</text>
    
<g transform="translate(180, 160)">
<!-- Terminal window with Markdown icon -->
<g id="terminal-icon">
<!-- Terminal window frame -->
<rect x="10" y="10" width="90" height="80" rx="8" fill="url(#terminalBg)" stroke="#64748b" stroke-width="2.5"/>
        
<!-- Terminal header bar -->
<rect x="10" y="10" width="90" height="18" rx="8" fill="#334155"/>
<rect x="10" y="20" width="90" height="8" fill="#334155"/>
        
<!-- Window control dots -->
<circle cx="20" cy="19" r="3" fill="#ef4444"/>
<circle cx="30" cy="19" r="3" fill="#fbbf24"/>
<circle cx="40" cy="19" r="3" fill="#22c55e"/>
        
<!-- Markdown "M" symbol in terminal -->
<g transform="translate(55, 55)">
<!-- Markdown M shape -->
<path d="M -15 -10 L -15 10 L -10 10 L -10 -2 L -5 5 L 0 -2 L 0 10 L 5 10 L 5 -10 L 0 -10 L -5 -2 L -10 -10 Z" 
fill="#22d3ee" 
stroke="#06b6d4" 
stroke-width="1"/>
          
<!-- Down arrow (markdown symbol) -->
<path d="M 8 -8 L 8 5 L 5 5 L 10 10 L 15 5 L 12 5 L 12 -8 Z" 
fill="#a855f7" 
stroke="#7c3aed" 
stroke-width="1"/>
</g>
        
<!-- Terminal cursor blink -->
<rect x="85" y="75" width="8" height="10" fill="#22d3ee">
<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
</rect>
        
<!-- Render loop indicator (spinning) -->
<circle cx="92" cy="16" r="5" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="15,10">
<animateTransform attributeName="transform" type="rotate" from="0 92 16" to="360 92 16" dur="2s" repeatCount="indefinite"/>
</circle>
</g>
      
<!-- Typography -->
<g transform="translate(125, 20)">
<text x="0" y="40" font-family="Consolas, Courier New, monospace" font-size="42" fill="#22d3ee" font-weight="bold">terminal</text>
<text x="210" y="40" font-family="Consolas, Courier New, monospace" font-size="42" fill="#a855f7" font-weight="bold">md</text>
<text x="0" y="56" font-family="Arial, sans-serif" font-size="10" fill="#64748b" letter-spacing="2.5" font-weight="500">TUI MARKDOWN BROWSER</text>
</g>
</g>
</g>
  
<!-- ICON MARK -->
<g id="icon-mark">
<text x="100" y="330" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" font-weight="600">ICON MARK</text>
    
<g transform="translate(200, 370)">
<!-- Container -->
<rect x="0" y="0" width="110" height="110" rx="22" fill="url(#iconBg)" stroke="url(#iconStroke)" stroke-width="3"/>
      
<!-- Terminal window centered -->
<g transform="translate(55, 55)">
<rect x="-40" y="-40" width="80" height="70" rx="7" fill="url(#terminalBg)" stroke="#64748b" stroke-width="2"/>
        
<!-- Header -->
<rect x="-40" y="-40" width="80" height="15" rx="7" fill="#334155"/>
<rect x="-40" y="-32" width="80" height="7" fill="#334155"/>
        
<!-- Dots -->
<circle cx="-32" cy="-32.5" r="2.5" fill="#ef4444"/>
<circle cx="-24" cy="-32.5" r="2.5" fill="#fbbf24"/>
<circle cx="-16" cy="-32.5" r="2.5" fill="#22c55e"/>
        
<!-- Markdown M + arrow -->
<g transform="translate(0, 5)">
<path d="M -12 -8 L -12 8 L -8 8 L -8 -2 L -4 4 L 0 -2 L 0 8 L 4 8 L 4 -8 L 0 -8 L -4 -2 L -8 -8 Z" 
fill="#22d3ee" 
stroke="#06b6d4" 
stroke-width="0.8"/>
          
<path d="M 7 -7 L 7 4 L 4 4 L 8 8 L 12 4 L 9 4 L 9 -7 Z" 
fill="#a855f7" 
stroke="#7c3aed" 
stroke-width="0.8"/>
</g>
</g>
</g>
</g>
  
<!-- ALTERNATIVE CONCEPT: Live Render -->
<g id="render-concept">
<text x="650" y="115" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" font-weight="600">ALTERNATIVE: LIVE MARKDOWN RENDER</text>
    
<g transform="translate(650, 150)">
<!-- Terminal window -->
<rect x="0" y="0" width="450" height="260" rx="12" fill="#0f172a" stroke="#475569" stroke-width="2"/>
      
<!-- Header -->
<rect x="0" y="0" width="450" height="35" rx="12" fill="#1e293b"/>
<rect x="0" y="23" width="450" height="12" fill="#1e293b"/>
      
<!-- Controls -->
<circle cx="18" cy="17" r="6" fill="#ef4444"/>
<circle cx="38" cy="17" r="6" fill="#fbbf24"/>
<circle cx="58" cy="17" r="6" fill="#22c55e"/>
      
<text x="225" y="24" font-family="Consolas, monospace" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="600">terminalmd README.md</text>
      
<!-- Render loop indicator -->
<circle cx="420" cy="17" r="6" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="18,10">
<animateTransform attributeName="transform" type="rotate" from="0 420 17" to="360 420 17" dur="2s" repeatCount="indefinite"/>
</circle>
      
<!-- Content area - Markdown rendered -->
<g transform="translate(20, 55)">
<!-- Heading -->
<text x="0" y="0" font-family="Consolas, monospace" font-size="16" fill="#22d3ee" font-weight="bold"># terminalmd</text>
        
<!-- Paragraph -->
<text x="0" y="25" font-family="Consolas, monospace" font-size="11" fill="#e2e8f0">A professional TUI Markdown browser for the terminal.</text>
        
<!-- Subheading -->
<text x="0" y="50" font-family="Consolas, monospace" font-size="13" fill="#a855f7" font-weight="bold">## Features</text>
        
<!-- List items -->
<text x="0" y="70" font-family="Consolas, monospace" font-size="11" fill="#10b981">•</text>
<text x="15" y="70" font-family="Consolas, monospace" font-size="11" fill="#cbd5e1">Full Markdown rendering with syntax highlighting</text>
        
<text x="0" y="88" font-family="Consolas, monospace" font-size="11" fill="#10b981">•</text>
<text x="15" y="88" font-family="Consolas, monospace" font-size="11" fill="#cbd5e1">Real-time render loop for interactive navigation</text>
        
<text x="0" y="106" font-family="Consolas, monospace" font-size="11" fill="#10b981">•</text>
<text x="15" y="106" font-family="Consolas, monospace" font-size="11" fill="#cbd5e1">Native AOT compilation - instant startup</text>
        
<!-- Code block -->
<rect x="0" y="120" width="410" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
<text x="10" y="138" font-family="Consolas, monospace" font-size="10" fill="#64748b">$</text>
<text x="25" y="138" font-family="Consolas, monospace" font-size="10" fill="#22d3ee">terminalmd</text>
<text x="115" y="138" font-family="Consolas, monospace" font-size="10" fill="#fbbf24">docs/guide.md</text>
        
<text x="10" y="156" font-family="Consolas, monospace" font-size="10" fill="#10b981">✓ Rendering...</text>
<text x="120" y="156" font-family="Consolas, monospace" font-size="10" fill="#64748b">0.001s</text>
        
<!-- Status bar -->
<rect x="0" y="185" width="410" height="18" rx="4" fill="#164e63" opacity="0.3"/>
<text x="205" y="198" font-family="Consolas, monospace" font-size="9" fill="#22d3ee" text-anchor="middle">⚡ .NET 8 AOT • Single Binary • Zero Dependencies</text>
</g>
</g>
</g>
  
<!-- COLOR VARIATIONS -->
